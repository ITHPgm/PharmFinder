<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PharmFinder — Create Your Account</title>
    <meta name="description" content="Sign up for PharmFinder to save pharmacies, contribute status updates, and list your own pharmacy." />
    <meta name="theme-color" content="#0D6B4E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #8E8E93;
            --ios-gray2: #AEAEB2;
            --ios-gray3: #C7C7CC;
            --ios-gray4: #D1D1D6;
            --ios-gray5: #E5E5EA;
            --ios-gray6: #F2F2F7;
            --ios-bg: #F9F9FB;
            --ios-white: #FFFFFF;
            --ios-black: #1C1C1E;
            --brand-primary: #0D6B4E;
            --brand-primary-light: #0F8A63;
            --brand-accent: #22C55E;
            --brand-bg-light: #ECFDF5;
            --brand-gradient: linear-gradient(135deg, #0D6B4E 0%, #0F8A63 30%, #1B9C6B 60%, #22C55E 100%);
            --glass-bg: rgba(255, 255, 255, 0.78);
            --glass-border: rgba(255, 255, 255, 0.65);
            --shadow-ios: 0 1px 3px rgba(0, 0, 0, 0.06), 0 6px 16px rgba(0, 0, 0, 0.06);
            --shadow-ios-lg: 0 4px 20px rgba(0, 0, 0, 0.10), 0 12px 40px rgba(0, 0, 0, 0.08);
            --shadow-glow-green: 0 0 40px rgba(13, 107, 78, 0.25), 0 0 80px rgba(34, 197, 94, 0.15);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --radius-full: 9999px;
            --transition-smooth: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-bounce: 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--ios-bg);
            color: var(--ios-black);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            filter: blur(80px);
            animation: orbFloat 16s ease-in-out infinite;
        }
        .bg-orb--1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.35) 0%, transparent 70%);
            top: -10%;
            left: -5%;
        }
        .bg-orb--2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(13, 107, 78, 0.3) 0%, transparent 70%);
            bottom: -10%;
            right: -5%;
            animation-delay: -6s;
            animation-duration: 18s;
        }
        .bg-orb--3 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(90, 200, 250, 0.2) 0%, transparent 70%);
            top: 45%;
            left: 55%;
            animation-delay: -11s;
            animation-duration: 20s;
        }
        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(35px, -30px) scale(1.08);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.92);
            }
        }

        /* Main wrapper */
        .auth-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            margin: 20px;
            animation: cardFadeIn 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: var(--radius-xl);
            padding: 32px 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-ios-lg), 0 0 0 1px rgba(255, 255, 255, 0.6);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-md);
            background: var(--brand-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            color: #fff;
            font-size: 1.9rem;
            box-shadow: 0 10px 28px rgba(13, 107, 78, 0.38);
        }
        .auth-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--ios-black);
            margin-bottom: 6px;
        }
        .auth-subtitle {
            font-size: 0.88rem;
            color: var(--ios-gray);
            font-weight: 400;
        }

        /* Form */
        .register-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--ios-gray);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .input-field {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.75);
            border: 1.5px solid var(--ios-gray4);
            border-radius: var(--radius-md);
            padding: 0 16px;
            transition: all var(--transition-smooth);
        }
        .input-field:focus-within {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px rgba(13, 107, 78, 0.08);
        }
        .input-field i {
            color: var(--ios-gray2);
            font-size: 1rem;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .input-field input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: var(--ios-black);
            outline: none;
        }
        .input-field input::placeholder {
            color: var(--ios-gray3);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--ios-gray);
            line-height: 1.4;
        }
        .checkbox-group input[type="checkbox"] {
            margin-top: 3px;
            accent-color: var(--brand-primary);
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .checkbox-group a {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: var(--brand-gradient);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all var(--transition-bounce);
            font-family: 'Inter', sans-serif;
            box-shadow: var(--shadow-glow-green), 0 6px 20px rgba(13, 107, 78, 0.3);
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow-green), 0 12px 32px rgba(13, 107, 78, 0.45);
        }
        .btn-register:active {
            transform: scale(0.96);
        }

        .auth-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: var(--ios-gray);
        }
        .auth-footer a {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 700;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--ios-gray2);
        }
        .back-link a {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* iOS Notification modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 9999;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 60px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-notification {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 22px;
            padding: 18px 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.6);
            transform: translateY(-30px) scale(0.92);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .modal-overlay.active .modal-notification {
            transform: translateY(0) scale(1);
        }
        .modal-notification__header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .modal-notification__app-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--brand-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.85rem;
        }
        .modal-notification__app-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--ios-black);
        }
        .modal-notification__time {
            font-size: 0.7rem;
            color: var(--ios-gray2);
            margin-left: auto;
        }
        .modal-notification__body {
            font-size: 0.9rem;
            color: var(--ios-black);
            line-height: 1.4;
            font-weight: 500;
        }
        .modal-notification__sub {
            font-size: 0.75rem;
            color: var(--ios-gray);
            margin-top: 4px;
        }
        .modal-notification__close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: rgba(0, 0, 0, 0.06);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--ios-gray);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-notification__actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .modal-notification__btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-full);
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .modal-notification__btn--primary {
            background: var(--brand-primary);
            color: #fff;
        }
        .modal-notification__btn--secondary {
            background: var(--ios-gray6);
            color: var(--ios-black);
        }

        @media (max-width: 500px) {
            .auth-card {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="auth-title">Join PharmFinder</h1>
                <p class="auth-subtitle">Create your account and start locating pharmacies instantly</p>
            </div>

            <form class="register-form" id="registerForm" novalidate>
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="John Doe" autocomplete="name" required />
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" required />
                    </div>
                </div>

                <div class="input-group">
                    <label>Phone Number (optional)</label>
                    <div class="input-field">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="regPhone" placeholder="+1 (555) 000-0000" autocomplete="tel" />
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="At least 8 characters" autocomplete="new-password" required />
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regConfirm" placeholder="Re-enter your password" autocomplete="new-password" required />
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" required />
                    <label for="agreeTerms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
                </div>

                <button type="submit" class="btn-register" id="btnRegisterSubmit">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
        </div>
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <!-- iOS Notification Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-notification" id="modalNotification">
            <button class="modal-notification__close" id="modalCloseBtn">
                <i class="fas fa-xmark"></i>
            </button>
            <div class="modal-notification__header">
                <div class="modal-notification__app-icon">
                    <i class="fas fa-prescription-bottle"></i>
                </div>
                <span class="modal-notification__app-name">PharmFinder</span>
                <span class="modal-notification__time" id="modalTime">now</span>
            </div>
            <div class="modal-notification__body" id="modalBody">Message</div>
            <div class="modal-notification__sub" id="modalSub"></div>
            <div class="modal-notification__actions">
                <button class="modal-notification__btn modal-notification__btn--secondary" id="modalBtnDismiss">Dismiss</button>
                <button class="modal-notification__btn modal-notification__btn--primary" id="modalBtnAction">OK</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Modal system
            const modalOverlay = document.getElementById('modalOverlay');
            const modalBody = document.getElementById('modalBody');
            const modalSub = document.getElementById('modalSub');
            const modalTime = document.getElementById('modalTime');
            const modalBtnDismiss = document.getElementById('modalBtnDismiss');
            const modalBtnAction = document.getElementById('modalBtnAction');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            let modalActionCallback = null;

            function showModal(bodyText, subText, actionLabel, callback, dismissLabel = 'Dismiss') {
                modalBody.textContent = bodyText;
                modalSub.textContent = subText || '';
                const now = new Date();
                modalTime.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                modalBtnAction.textContent = actionLabel || 'OK';
                modalBtnDismiss.textContent = dismissLabel;
                modalActionCallback = callback || null;
                modalOverlay.classList.add('active');
            }

            function hideModal() {
                modalOverlay.classList.remove('active');
                modalActionCallback = null;
            }

            modalCloseBtn.addEventListener('click', hideModal);
            modalBtnDismiss.addEventListener('click', hideModal);
            modalBtnAction.addEventListener('click', () => {
                if (modalActionCallback && typeof modalActionCallback === 'function') {
                    modalActionCallback();
                }
                hideModal();
            });
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) hideModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) hideModal();
            });

            // Form handling
            const form = document.getElementById('registerForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirm').value;
                const agree = document.getElementById('agreeTerms').checked;

                // Validation
                if (!name || !email || !password || !confirm) {
                    showModal('Missing Information', 'Please fill in all required fields.', 'OK');
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showModal('Invalid Email', 'Please enter a valid email address.', 'OK');
                    return;
                }
                if (password.length < 8) {
                    showModal('Weak Password', 'Password must be at least 8 characters long.', 'OK');
                    return;
                }
                if (password !== confirm) {
                    showModal('Password Mismatch', 'The two passwords you entered do not match.', 'OK');
                    return;
                }
                if (!agree) {
                    showModal('Terms Required', 'You must agree to the Terms of Service and Privacy Policy.', 'OK');
                    return;
                }

                // All good – show success & redirect
                showModal(
                    'Account Created Successfully!',
                    'Welcome to PharmFinder, ' + name + '! You can now sign in with your new account.',
                    'Sign In Now',
                    () => {
                        window.location.href = 'login.html'; // Redirect to login
                    }
                );
            });

            console.log('📝 PharmFinder Register page ready.');
        })();
    </script>
</body>
</html>
